<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torrent İndirici</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .torrent-name {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
            word-break: break-word;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .status-indiriliyor {
            background: #4CAF50;
            color: white;
        }

        .status-tamamlandi {
            background: #2196F3;
            color: white;
        }

        .status-hata {
            background: #f44336;
            color: white;
        }

        .progress-container {
            background: #e0e0e0;
            border-radius: 15px;
            height: 30px;
            overflow: hidden;
            margin-bottom: 20px;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-label {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .stat-value {
            color: #333;
            font-size: 24px;
            font-weight: bold;
        }

        .refresh-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            transition: transform 0.2s;
        }

        .refresh-btn:hover {
            transform: scale(1.02);
        }

        .refresh-btn:active {
            transform: scale(0.98);
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 18px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .loading {
            animation: pulse 1.5s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Torrent İndirici</h1>
        <div id="content">
            <p class="loading">Yükleniyor...</p>
        </div>
    </div>

    <script>
        async function fetchStatus() {
            try {
                const response = await fetch('/torrent/status');
                const data = await response.json();
                
                const content = document.getElementById('content');
                
                if (data.status === 'bekliyor') {
                    content.innerHTML = `
                        <div style="text-align: center;">
                            <p style="margin-bottom: 20px; color: #666;">Torrent dosyası seç ve indirmeyi başlat</p>
                            <input type="file" id="torrentFile" accept=".torrent" style="display: none;">
                            <button onclick="document.getElementById('torrentFile').click()" class="refresh-btn">
                                📁 Torrent Dosyası Seç
                            </button>
                        </div>
                    `;
                    
                    document.getElementById('torrentFile').onchange = async (e) => {
                        const file = e.target.files[0];
                        if (!file) return;
                        
                        const formData = new FormData();
                        formData.append('torrent', file);
                        
                        content.innerHTML = '<p class="loading">Yükleniyor...</p>';
                        
                        try {
                            await fetch('/torrent/upload', {
                                method: 'POST',
                                body: formData
                            });
                        } catch (error) {
                            alert('Yükleme hatası');
                        }
                    };
                } else {
                    content.innerHTML = `
                        <div class="torrent-name">${data.torrent || 'Torrent yükleniyor...'}</div>
                        <div style="text-align: center;">
                            <span class="status-badge status-${data.status}">${data.status.toUpperCase()}</span>
                        </div>
                        <div class="progress-container">
                            <div class="progress-bar" style="width: ${data.progress}">
                                ${data.progress}
                            </div>
                        </div>
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-label">Hız</div>
                                <div class="stat-value">${data.speed}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Peers</div>
                                <div class="stat-value">${data.peers}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">İndirilen</div>
                                <div class="stat-value">${data.downloaded}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Toplam</div>
                                <div class="stat-value">${data.total}</div>
                            </div>
                            <div class="stat-card" style="grid-column: span 2;">
                                <div class="stat-label">Kalan Süre</div>
                                <div class="stat-value">${data.eta}</div>
                            </div>
                        </div>
                    `;
                }
            } catch (error) {
                document.getElementById('content').innerHTML = `
                    <p style="color: red; text-align: center;">Bağlantı hatası</p>
                `;
            }
        }

        fetchStatus();
        setInterval(fetchStatus, 1000);
    </script>
</body>
</html>
